# FinAgentX — Prometheus Configuration
# Scrapes metrics from all 3 services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Python AI Core — FastAPI + custom agent metrics
  - job_name: "python-ai-core"
    metrics_path: /metrics
    static_configs:
      - targets: ["python-ai-core:8000"]
        labels:
          service: "ai-core"
          language: "python"

  # Go Gateway — gRPC + Kafka + audit metrics
  - job_name: "go-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["go-gateway:8080"]
        labels:
          service: "gateway"
          language: "go"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Kafka JMX metrics (if JMX exporter is configured)
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9092"]
        labels:
          service: "kafka"
