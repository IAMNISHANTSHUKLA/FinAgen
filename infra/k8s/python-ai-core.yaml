apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-ai-core
  namespace: finagentx
  labels:
    app: python-ai-core
    component: ai-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-ai-core
  template:
    metadata:
      labels:
        app: python-ai-core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ai-core
          image: finagentx/python-ai-core:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CEREBRAS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: finagentx-secrets
                  key: cerebras-api-key
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: finagentx-secrets
                  key: jwt-public-key
            - name: REDIS_URL
              value: "redis://redis-svc:6379/0"
            - name: WEAVIATE_URL
              value: "http://weaviate-svc:8080"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-svc:9092"
            - name: MINIO_ENDPOINT
              value: "minio-svc:9000"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: python-ai-core-svc
  namespace: finagentx
spec:
  selector:
    app: python-ai-core
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
