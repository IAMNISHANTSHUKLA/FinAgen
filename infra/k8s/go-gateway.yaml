apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-gateway
  namespace: finagentx
  labels:
    app: go-gateway
    component: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: go-gateway
  template:
    metadata:
      labels:
        app: go-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: finagentx/go-gateway:latest
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 8443
              name: rest
          env:
            - name: AI_CORE_URL
              value: "python-ai-core-svc:8000"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-svc:9092"
            - name: REDIS_URL
              value: "redis://redis-svc:6379/1"
            - name: MINIO_ENDPOINT
              value: "minio-svc:9000"
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: finagentx-secrets
                  key: jwt-public-key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: go-gateway-svc
  namespace: finagentx
spec:
  selector:
    app: go-gateway
  ports:
    - port: 8080
      targetPort: 8080
      name: grpc
    - port: 8443
      targetPort: 8443
      name: rest
  type: LoadBalancer
